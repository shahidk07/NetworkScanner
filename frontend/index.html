<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>NetScan</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <h1>⚡ NetScan</h1>

        <div>
            <label>
                <input type="radio" name="mode" value="single" checked> Single IP
            </label>
            <label>
                <input type="radio" name="mode" value="network"> Network Scan
            </label>  </div>
        <div>
            <label>
                <input type="radio" name="iptype" value="ipv4" checked> IPv4
            </label>
            <label>
                <input type="radio" name="iptype" value="ipv6"> IPv6
            </label>
        </div>
        <div class="input-box">
            <input type="text" id="ip" placeholder="Enter IP or network (e.g. 192.168.1)">
            <input type="number" id="range" placeholder="Port range (e.g. 1000)">
            <button onclick="scan()">Scan</button>
        </div>

        <div id="status"></div>

        <table id="result-table">
            <thead>
                <tr>
                    <th>Host</th>
                    <th>Port</th>
                    <th>Protocol</th>
                    <th>Service</th>
                </tr>
            </thead>
            <tbody id="results"></tbody></table>

    </div>

    <script src="script.js"></script>
</body>

</html>
